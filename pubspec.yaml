name: story_app
description: "StoryBloom app for Dicoding Story submission."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  freezed_annotation: ^2.4.4
  flutter_map: ^8.2.1
  geocoding: ^4.0.0
  geolocator: ^12.0.0
  go_router: ^14.8.1
  http: ^1.2.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  latlong2: ^0.9.1
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  shimmer: ^3.0.0

dev_dependencies:
  build_runner: ^2.4.14
  freezed: ^2.5.8
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
